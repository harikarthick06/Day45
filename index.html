<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Payroll App</title>

    <link rel="stylesheet" href="./css/employee_payroll.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- UC 1: Header -->
    <header class="header">
        <div class="logo-content">
            <div class="logo-symbol">👤</div>
            <div>
                <span class="emp-text">EMPLOYEE</span><br>
                <span class="emp-text emp-payroll">PAYROLL</span>
            </div>
        </div>
    </header>

    <!-- UC 2: Main content with Employee Details and Add User button -->
    <main class="main-content">
        <div class="header-content">
            <div class="emp-detail-text">
                Employee Details
                <span class="emp-count">10</span>
            </div>

            <a href="./pages/employee_payroll_form.html" class="add-button">
                <span class="plus-icon">+</span>
                Add User
            </a>
        </div>

        <!-- UC 3: Table -->
        <div class="table-main">
            <table class="table">
                <tr>
                    <th></th>
                    <th>Name</th>
                    <th>Gender</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Start Date</th>
                    <th>Actions</th>
                </tr>

                <tr>
                    <td><div class="profile">👨</div></td>
                    <td>Narayan Mahadevan</td>
                    <td>Male</td>
                    <td>
                        <div class="dept-label">HR</div>
                        <div class="dept-label">Finance</div>
                    </td>
                    <td>₹ 300000</td>
                    <td>1 Nov 2020</td>
                    <td>
                        <span class="action-icon">🗑️</span>
                        <span class="action-icon">✏️</span>
                    </td>
                </tr>
            </table>
        </div>
    </main>

</body>
</html>
