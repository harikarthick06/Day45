<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Payroll App</title>

    <link rel="stylesheet" href="./css/employee_payroll.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- UC 1: Header -->
    <header class="header">
        <div class="logo-content">
            <div class="logo-symbol">👤</div>
            <div>
                <span class="emp-text">EMPLOYEE</span><br>
                <span class="emp-text emp-payroll">PAYROLL</span>
            </div>
        </div>
    </header>

    <!-- UC 2: Main content with Employee Details and Add User button -->
    <main class="main-content">
        <div class="header-content">
            <div class="emp-detail-text">
                Employee Details
                <span class="emp-count">10</span>
            </div>

            <a href="./pages/employee_payroll_form.html" class="add-button">
                <span class="plus-icon">+</span>
                Add User
            </a>
        </div>

        <!-- UC 4: Table -->
        <div class="table-main">
            <table id="table-display" class="table"></table>
        </div>
    </main>

    <script src="./js/employee_payroll.js"></script>

</body>
</html>
